title: easypaydirect-mcp
description: >-
  Read-only Model Context Protocol (MCP) server for the Easy Pay Direct (EPD) /
  NMI-family payment gateway Query API.
remote_theme: just-the-docs/just-the-docs@v0.12.0
url: https://praveendias1180.github.io
baseurl: /easypaydirect-mcp

defaults:
  - scope:
      path: ""
    values:
      layout: default

color_scheme: gravity
logo: /assets/images/logo.svg?v=2
favicon_ico: /assets/images/favicon.svg

search_enabled: true
search:
  heading_level: 2
  previews: 3
  button: true
heading_anchors: true

aux_links:
  "GitHub ↗":
    - https://github.com/praveendias1180/easypaydirect-mcp
  "npm ↗":
    - https://www.npmjs.com/package/easypaydirect-mcp
aux_links_new_tab: true

footer_content: >-
  MIT-licensed · Unofficial — not affiliated with Easy Pay Direct or NMI.
last_edit_timestamp: false

callouts:
  readonly:
    title: Read-only
    color: green
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: yellow
  security:
    title: Security
    color: purple

plugins:
  - jekyll-remote-theme

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
